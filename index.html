<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Escalade 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;padding:14px;color:#fff;}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;}
#hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
#hdr img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.3);}
#hdr h1{font-size:1.5rem;font-weight:700;}
#hdr p{font-size:0.8rem;opacity:0.7;margin-top:2px;}
#stats{display:flex;gap:8px;margin-bottom:16px;}
.st{background:rgba(255,255,255,0.1);padding:10px;border-radius:10px;text-align:center;flex:1;}
.st .n{font-size:1.5rem;font-weight:700;}
.st .l{font-size:0.7rem;opacity:0.7;}
#fil{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.fb{padding:7px 12px;border-radius:18px;border:none;font-size:0.8rem;font-weight:600;background:rgba(255,255,255,0.15);color:#fff;}
.fb.on{background:#4CAF50;}
.sec{background:rgba(255,255,255,0.05);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.sh{background:rgba(255,255,255,0.1);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.sh h2{font-size:0.95rem;}
.sh span{background:rgba(255,255,255,0.2);padding:3px 9px;border-radius:9px;font-size:0.75rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:10px;}
.card{background:rgba(255,255,255,0.08);border-radius:9px;padding:11px;border-left:5px solid #888;position:relative;}
.card.done{opacity:0.75;}
.bdg{position:absolute;top:8px;right:8px;padding:2px 6px;border-radius:4px;font-size:0.6rem;font-weight:700;}
.cn{display:flex;align-items:center;gap:7px;font-weight:700;font-size:0.9rem;margin-bottom:7px;padding-right:80px;}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;display:inline-block;border:1px solid rgba(255,255,255,0.3);}
.tgs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.tg{background:rgba(255,255,255,0.15);padding:2px 7px;border-radius:4px;font-size:0.75rem;}
.tg.q{font-weight:700;background:rgba(255,255,255,0.25);}
.ouv{font-size:0.7rem;opacity:0.55;margin-bottom:9px;}
.bts{display:flex;gap:4px;}
.vb{flex:1;padding:9px 2px;border:none;border-radius:6px;font-size:0.7rem;font-weight:700;color:#fff;background:rgba(255,255,255,0.15);}
.vb.on{box-shadow:0 0 0 2px rgba(255,255,255,0.5);}
</style>
</head>

  {k:"vue",    l:"A VUE",   b:"#22c55e"},
  {k:"travail",l:"Apres TRAVAIL", b:"#f97316"},
  {k:"encours",l:"EN COURS",b:"#3b82f6"},
  {k:"echec",  l:"ECHEC",   b:"#ef4444"}
];
var FL=[
  {id:"all",t:"Toutes"},
  {id:"5",t:"5a-5c+"},
  {id:"6",t:"6a-6c+"},
  {id:"7",t:"7a-7c+"},
  {id:"8",t:"8a+"},
  {id:"ok",t:"Validees"},
  {id:"no",t:"En attente"}
];
var V={},CF="all";
try { var saved=localStorage.getItem("caf2026"); if(saved) V=JSON.parse(saved); } catch(e){}
function gc(c){return CM[c]||"#808080";}
function upd(){
  var v=0,p=0;
  for(var k in V){if(V[k]=="vue"||V[k]=="travail")v++;if(V[k]=="encours")p++;}
  document.getElementById("val").textContent=v;
  document.getElementById("prg").textContent=p;
}
function render(){
  var fi=[];
  for(var i=0;i<routes.length;i++){
    var r=routes[i],s=V[i];
    if(CF=="all")fi.push(i);
    else if(CF=="ok"&&(s=="vue"||s=="travail"))fi.push(i);
    else if(CF=="no"&&!s)fi.push(i);
    else if(CF=="5"||CF=="6"||CF=="7"||CF=="8"){if(r.q[0]==CF)fi.push(i);}
  }
  var sec={};
  for(var j=0;j<fi.length;j++){var r=routes[fi[j]];if(!sec[r.d])sec[r.d]=[];sec[r.d].push(fi[j]);}
  var ks=Object.keys(sec).sort(function(a,b){return+a-+b;});
  var app=document.getElementById("app");
  app.innerHTML="";
  if(!ks.length){app.innerHTML="<p style='text-align:center;padding:30px;opacity:0.5'>Aucune voie</p>";return;}
  for(var ki=0;ki<ks.length;ki++){
    var k=ks[ki],sd=document.createElement("div");sd.className="sec";
    var sh=document.createElement("div");sh.className="sh";
    var h=document.createElement("h2");h.textContent="Secteur "+k;
    var sp=document.createElement("span");sp.textContent=sec[k].length+" voies";
    sh.appendChild(h);sh.appendChild(sp);sd.appendChild(sh);
    var g=document.createElement("div");g.className="grid";
    for(var ri=0;ri<sec[k].length;ri++){
      var idx=sec[k][ri],r=routes[idx],s=V[idx],bc=gc(r.c);
      var cd=document.createElement("div");cd.className="card"+(s?" done":"");cd.style.borderLeftColor=bc;
      if(s){var si=SC.findIndex(function(x){return x.k===s;});if(si>=0){var bd=document.createElement("span");bd.className="bdg";bd.style.background=SC[si].b;bd.textContent=SC[si].l;cd.appendChild(bd);}}
      var cn=document.createElement("div");cn.className="cn";
      var dt=document.createElement("span");dt.className="dot";dt.style.background=bc;
      cn.appendChild(dt);cn.appendChild(document.createTextNode(r.n));cd.appendChild(cn);
      var tg=document.createElement("div");tg.className="tgs";
      ["q","c","a"].forEach(function(f){var t=document.createElement("span");t.className="tg"+(f=="q"?" q":"");t.textContent=f=="a"?"-> "+r.a:r[f];tg.appendChild(t);});
      cd.appendChild(tg);
      var ov=document.createElement("div");ov.className="ouv";ov.textContent="Ouvreur: "+r.o;cd.appendChild(ov);
      var bt=document.createElement("div");bt.className="bts";
      for(var si2=0;si2<SC.length;si2++){
        var cfg=SC[si2],bn=document.createElement("button");
        bn.className="vb"+(s===cfg.k?" on":"");
        bn.style.background=s===cfg.k?cfg.b:"rgba(255,255,255,0.15)";
        bn.textContent=cfg.l;bn.dataset.i=idx;bn.dataset.k=cfg.k;
        bt.appendChild(bn);
      }
      cd.appendChild(bt);g.appendChild(cd);
    }
    sd.appendChild(g);app.appendChild(sd);
  }
}
function mkFil(){
  var f=document.getElementById("fil");f.innerHTML="";
  for(var i=0;i<FL.length;i++){
    var b=document.createElement("button");b.className="fb"+(CF==FL[i].id?" on":"");
    b.textContent=FL[i].t;b.dataset.f=FL[i].id;f.appendChild(b);
  }
}
document.addEventListener("click",function(e){
  var t=e.target;
  if(t.classList.contains("fb")){CF=t.dataset.f;mkFil();render();}
  if(t.classList.contains("vb")){var i=+t.dataset.i,k=t.dataset.k;if(V[i]===k)delete V[i];else V[i]=k;try{localStorage.setItem("caf2026",JSON.stringify(V));}catch(e){} upd();render();}
});
